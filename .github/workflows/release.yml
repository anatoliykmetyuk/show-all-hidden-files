name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          if ! echo "${GITHUB_REF_NAME}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag ${GITHUB_REF_NAME} is not a supported x.y.z semantic version"
            exit 1
          fi
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${manifest_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${manifest_version}"
            exit 1
          fi

      - name: Build release asset
        run: npm run build

      - name: Verify release assets
        run: |
          test -s main.js
          test -s manifest.json
          node --check main.js

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" main.js manifest.json \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"
